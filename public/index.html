<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Players Auction System</title>
  <style>
    :root{--bg:#071026;--card:#0b1220;--muted:#94a3b8;--accent:#7c3aed;--glass:rgba(255,255,255,0.03)}
    *{box-sizing:border-box;font-family:Inter, system-ui, -apple-system, Roboto, Arial}
    body{margin:0;background:linear-gradient(180deg,#071020 0%,#071827 60%);color:#e6eef8;min-height:100vh;}
    
    /* Layout */
    .container{max-width:1200px;margin:0 auto; padding: 18px;}
    h1{margin:0 0 10px;font-size:20px}
    .flex{display:flex;gap:12px;align-items:center}
    .card{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 20px rgba(2,6,23,0.6); margin-bottom: 12px;}
    .grid{display:grid;grid-template-columns:1fr 340px;gap:12px}
    label{display:block;margin-bottom:6px;color:var(--muted);font-size:13px}
    textarea{width:100%;min-height:90px;background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;color:inherit}
    
    /* Login */
    #portal, #teamAuthOverlay { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .portal-card { background: var(--card); padding: 30px; border-radius: 12px; width: 350px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
    .tab-nav { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .tab { flex: 1; padding: 10px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
    .tab.active { color: white; border-color: var(--accent); font-weight: bold; }
    
    /* Buttons */
    button{background:linear-gradient(90deg,var(--accent),#4f46e5);border:0;padding:8px 12px;color:white;border-radius:6px;cursor:pointer; font-size:13px; font-weight:600;}
    button:hover{filter:brightness(1.1)}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.1)}
    button.green{background:#10b981;}
    button.red{background:#ef4444;}
    button.yellow{background:#f59e0b;}
    button.blue{background:#3b82f6;}
    button.small{padding: 5px 10px; font-size: 11px;}
    button.player-btn { width: 100%; text-align: left; background: rgba(255,255,255,0.05); padding: 8px; border: 1px solid transparent; border-radius: 4px; transition: 0.2s; }
    button.player-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    button.player-btn.disabled { opacity: 1; cursor: default; }
    button.player-btn.disabled:hover { background: rgba(255,255,255,0.05); border-color: transparent; }
    
    input, select { background:var(--glass); border:1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 10px; }

    /* List & Cards */
    .players{margin-top:10px}
    .player{display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);margin-bottom:8px; border:1px solid transparent; transition:0.2s}
    .player.sold{opacity: 0.5; border-color: #7c3aed;}
    .player.bidding{border-color: #fbbf24; background: rgba(251, 191, 36, 0.1);}
    
    .team-config-row { display: grid; grid-template-columns: 0.5fr 1.5fr 1fr 0.8fr auto auto; gap: 8px; margin-bottom: 8px; align-items: center; }
    .team-row{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:8px;background:rgba(255,255,255,0.02); margin-bottom: 8px;}

    /* Modals */
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:4000;backdrop-filter:blur(5px);}
    .modal{background:#0f172a;padding:25px;border-radius:12px;width:400px;max-width:90%;border:1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5);}
    .hidden{display:none !important;}

    /* Detail Modal Styles */
    .player-detail-img { width: 120px; height: 120px; background: #1e293b; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px solid var(--accent); }
    .player-detail-img img { width: 100%; height: 100%; object-fit: cover; }
    .player-detail-img svg { width: 60px; height: 60px; fill: var(--muted); }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 6px; }

    /* Toast */
    #toastContainer {position: fixed; top: 20px; right: 20px; z-index: 6000; display: flex; flex-direction: column; gap: 10px;}
    .toast {background: #1e293b; color: #fff; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #7c3aed; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out;}
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Sold Animation */
    #soldAnimationOverlay { position: fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; display:flex; justify-content:center; align-items:center; }
    #hammer{ width:120px; height:120px; transform-origin:20% 20%; pointer-events:none; position:fixed; left:50%; margin-left:-60px; top:40px; z-index:4500; display: none; }
    #hammer.swing{ display: block; animation: hammerSwing 560ms cubic-bezier(.2,.8,.2,1) forwards; }
    @keyframes hammerSwing { 0% { transform: rotate(-35deg) translateY(-10px) translateX(-20px); opacity: 0; } 10% { opacity: 1; } 30% { transform: rotate(25deg); } 60% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); opacity: 0; } }

    @media (max-width:900px){.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

  <div id="portal">
    <h1 style="color:white;margin-bottom:20px;">Players Auction System</h1>
    <div class="portal-card">
      <div class="tab-nav">
        <div class="tab active" onclick="switchTab('manager')">Manager Login</div>
        <div class="tab" onclick="switchTab('participant')">Join Auction</div>
      </div>
      <div id="managerForm">
        <input id="mUser" placeholder="Username (Host ID)">
        <input id="mPass" type="password" placeholder="Password">
        <button onclick="managerLogin()" style="width:100%">Login / Load Auction</button>
        <button onclick="managerRegister()" class="ghost" style="width:100%; margin-top:5px; font-size:12px">Create New Account</button>
      </div>
      <div id="participantForm" class="hidden">
        <input id="pHostId" placeholder="Enter Host ID (Manager Username)">
        <button onclick="connectToHost()" style="width:100%">Connect</button>
      </div>
      <div id="portalMsg" style="color:#ef4444; margin-top:10px; font-size:13px;"></div>
    </div>
  </div>

  <div id="teamAuthOverlay" class="hidden">
    <div class="portal-card">
      <h3>Auction Room Login</h3>
      <div style="margin-bottom:15px;">
        <label>Your Role</label>
        <select id="loginRole" onchange="toggleTeamPass()">
          <option value="listener">Viewer / Guest</option>
          <option value="team">Team Representative</option>
        </select>
      </div>
      <div id="teamSelectGroup" class="hidden" style="margin-bottom:15px;">
        <label>Select Your Team</label>
        <select id="loginTeamId"></select>
      </div>
      <div id="passGroup" class="hidden" style="margin-bottom:15px;">
        <label>Team Password</label>
        <input type="password" id="loginPass">
      </div>
      <button onclick="enterAuction()" style="width:100%">Enter Auction</button>
      <div id="teamAuthMsg" style="color:#ef4444; font-size:12px; margin-top:10px;"></div>
    </div>
  </div>

  <div id="appContainer" class="hidden">
    <div id="toastContainer"></div>

    <div class="overlay hidden" id="soldActionOverlay">
      <div class="modal">
        <h3>Mark Player Sold</h3>
        <div id="soldActionDetails" style="margin-bottom:15px; color:#fbbf24; font-weight:bold;"></div>
        <label>Select Winning Team</label>
        <select id="soldActionTeam" style="margin-bottom:15px;"></select>
        <div class="flex" style="justify-content:flex-end">
          <button id="btnCancelSold" class="ghost">Cancel</button>
          <button id="btnConfirmSold" class="green">Confirm Sale</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="playerDetailModal">
      <div class="modal" style="text-align:center;">
        <div class="flex" style="justify-content: flex-end; margin-bottom: -20px;">
          <button class="ghost small" id="btnCloseDetail">✕</button>
        </div>
        
        <div class="player-detail-img" id="detailImgContainer"></div>
        
        <div id="adminImgControls" class="hidden" style="margin-bottom:15px;">
             <div class="flex">
                 <input id="detailImgUrl" placeholder="Paste Image URL here..." style="margin:0; font-size:11px;">
                 <button class="ghost small" onclick="savePlayerImage()">Save Img</button>
             </div>
        </div>

        <h2 id="detailName" style="margin:0 0 5px 0">Player Name</h2>
        <div class="badge" id="detailCat" style="display:inline-block; margin-bottom:15px;">Category</div>
        
        <div class="stat-row">
           <span>Current Price:</span>
           <span id="detailPrice" style="font-weight:bold; color:var(--accent); font-size:18px;">0</span>
        </div>

        <div id="detailAdminActions" class="grid hidden" style="grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button id="btnDetailBid" class="blue" style="height:50px; font-size:15px;">+ INCREMENT</button>
            <button id="btnDetailSold" class="green" style="height:50px; font-size:15px;">SOLD</button>
        </div>
        
        <div id="detailViewerMsg" class="small hidden" style="color:var(--muted); margin-top:10px;">
            <span id="viewStatus">Waiting for Auctioneer...</span>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="banner" style="display:flex; justify-content:space-between; align-items:start;">
        <div>
          <h1>Players Auction System</h1>
          <div class="small" id="roleDisplay" style="color:var(--muted)"></div>
        </div>
        <div class="flex">
          <button id="btnExportAdmin" class="blue hidden" style="font-size:11px; padding:4px 8px;">Export CSV</button>
          <button id="btnResetSystem" class="red hidden" style="font-size:11px; padding:4px 8px;">Reset System</button>
          <button onclick="location.reload()" class="ghost" style="font-size:11px; padding:4px 8px;">Logout</button>
        </div>
      </div>

      <div class="grid">
        <div>
          <div class="card hidden" id="adminConfigCard">
            <strong>Admin Configuration</strong>
            <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
              <div class="flex">
                <input id="newCatId" placeholder="ID (e.g. A)" style="width:80px; margin:0">
                <input id="newCatBase" placeholder="Base" type="number" style="margin:0">
                <input id="newCatInc" placeholder="Inc" type="number" style="margin:0">
                <button id="btnAddCat" class="small">Add Cat</button>
              </div>
            </div>
            <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
              <div class="team-config-row team-config-header">
                <span>ID</span> <span>Name</span> <span>Pass</span> <span>Purse</span> <span>Reset</span> <span>Del</span>
              </div>
              <div id="teamsConfigContainer"></div>
              <button id="btnAddTeamRow" class="ghost small" style="margin-top:8px; width:100%">+ Add Team Slot</button>
              <button id="btnSaveTeams" class="green small" style="margin-top:8px; width:100%">Save Teams</button>
            </div>
          </div>

          <div class="card">
            <strong>Players</strong>
            <div id="categoriesContainer" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:12px;margin-top:10px"></div>
          </div>

          <div class="card">
            <strong>Log</strong>
            <div id="log" class="log" style="max-height:100px; overflow-y:auto; font-size:12px; color:var(--muted)"></div>
          </div>
        </div>

        <div>
          <div class="card">
            <strong>Scoreboard</strong>
            <div id="scoreboard" style="margin-top:10px"></div>
          </div>
          <div class="card hidden" id="myTeamCard">
             <div style="display:flex; justify-content:space-between;">
              <strong>My Dashboard</strong>
              <button id="btnExportTeam" class="ghost" style="font-size:10px; padding:2px 6px;">Export CSV</button>
             </div>
            <div id="myTeamContent" style="margin-top:10px"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="soldAnimationOverlay">
      <div class="card" style="text-align:center; padding:40px; border:2px solid #ffd166;">
        <h1 style="color:#ffd166; font-size:40px; margin:0;">SOLD!</h1>
        <h2 id="animPlayer">Player</h2>
        <p>Sold to <strong id="animTeam">Team</strong> for <span id="animPrice">0</span></p>
      </div>
    </div>

    <img id="hammer" src="/hammer.png" alt="hammer" onerror="this.style.display='none'" />
    <audio id="hammerAudio" src="/hammer.wav"></audio>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  
  <script>
    const socket = io();
    
    let CURRENT_USER = { role: null, teamId: null, hostId: null };
    let STATE = { teams: [], categories: [], playersSnapshot: {}, activeBids: {}, soldPrices: {} };
    let pendingSold = null;
    let currentlyViewedPlayer = null; 

    // -- Portal & Auth --
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById('managerForm').classList.toggle('hidden', tab !== 'manager');
        document.getElementById('participantForm').classList.toggle('hidden', tab !== 'participant');
    }
    function managerLogin() {
        const u = document.getElementById('mUser').value; const p = document.getElementById('mPass').value;
        socket.emit('manager:login', { username: u, password: p });
    }
    function managerRegister() {
        const u = document.getElementById('mUser').value; const p = document.getElementById('mPass').value;
        socket.emit('manager:register', { username: u, password: p });
    }
    function connectToHost() {
        socket.emit('participant:connect', document.getElementById('pHostId').value);
    }
    function enterAuction() {
        socket.emit('team:login', { 
            hostId: CURRENT_USER.hostId, 
            teamId: document.getElementById('loginTeamId').value, 
            password: document.getElementById('loginPass').value, 
            role: document.getElementById('loginRole').value 
        });
    }

    socket.on('auth:portal_error', (msg) => document.getElementById('portalMsg').textContent = msg);
    socket.on('auth:portal_success', (d) => { document.getElementById('portalMsg').style.color='#10b981'; document.getElementById('portalMsg').textContent = d.msg; });
    
    socket.on('manager:logged_in', (data) => {
        CURRENT_USER.hostId = data.username; CURRENT_USER.role = 'admin'; STATE = data.state;
        initApp();
    });
    socket.on('init:teams_available', (data) => {
        CURRENT_USER.hostId = data.hostId;
        const sel = document.getElementById('loginTeamId'); sel.innerHTML = '<option value="">Select Team</option>';
        data.teams.forEach(t => sel.innerHTML += `<option value="${t.id}">${t.name}</option>`);
        document.getElementById('portal').classList.add('hidden');
        document.getElementById('teamAuthOverlay').classList.remove('hidden');
    });
    socket.on('auction:enter', (data) => {
        CURRENT_USER.role = data.role; CURRENT_USER.teamId = data.teamId; STATE = data.state;
        document.getElementById('teamAuthOverlay').classList.add('hidden');
        initApp();
    });

    function initApp() {
        document.getElementById('portal').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');
        setupUI();
        renderAll();
    }

    // -- Core Logic --
    socket.on('state:updated', (newState) => {
      STATE = newState;
      renderAll();
      // Update Detail Modal if open
      if(currentlyViewedPlayer && !document.getElementById('playerDetailModal').classList.contains('hidden')) {
          const catList = STATE.playersSnapshot[currentlyViewedPlayer.category];
          const p = catList ? catList.find(x => x.name === currentlyViewedPlayer.name) : null;
          if(p) {
             // If someone updated the image url
             if(p.image && p.image !== currentlyViewedPlayer.image) {
                 currentlyViewedPlayer.image = p.image;
                 updateModalImage(p.image);
             }
             // Sync Price if not mid-bid
             const key = `${currentlyViewedPlayer.category}:${p.name}`;
             const price = STATE.soldPrices[key] || STATE.activeBids[key] || p.price;
             document.getElementById('detailPrice').textContent = price;
          }
      }
      if(CURRENT_USER.role === 'admin') renderTeamConfig();
    });

    socket.on('player:bid', (pl) => {
      const el = getPlayerEl(pl.category, pl.name);
      if(el) {
        el.dataset.price = pl.price;
        el.querySelector('.price').textContent = `৳ ${pl.price}`;
        el.querySelector('.price').style.color = '#fbbf24';
        el.classList.add('bidding'); setTimeout(()=>el.classList.remove('bidding'), 300);
      }
      // Update modal live
      if(currentlyViewedPlayer && currentlyViewedPlayer.name === pl.name) {
          document.getElementById('detailPrice').textContent = pl.price;
      }
      log(`BID: ${pl.name} -> ${pl.price}`);
    });

    socket.on('player:sold', (data) => {
      const { category, name, price, teamId } = data.payload;
      STATE.teams = data.teams;
      
      const el = getPlayerEl(category, name);
      if(el) el.classList.add('sold');
      
      // Close detail modal automatically for everyone
      closePlayerModal(false); 

      const teamName = STATE.teams.find(t=>t.id===teamId)?.name || teamId;
      document.getElementById('animPlayer').textContent = name;
      document.getElementById('animTeam').textContent = teamName;
      document.getElementById('animPrice').textContent = price;
      
      const ov = document.getElementById('soldAnimationOverlay');
      ov.classList.remove('hidden');
      
      const hammer = document.getElementById('hammer');
      hammer.style.display = 'block'; hammer.classList.remove('swing'); void hammer.offsetWidth; hammer.classList.add('swing');
      
      const audio = document.getElementById('hammerAudio');
      if(audio) { audio.pause(); audio.currentTime = 0; audio.play().catch(e=>{}); }

      setTimeout(() => ov.classList.add('hidden'), 3500);
      renderScoreboard();
      renderMyTeam();
    });

    // --- POPUP SYNC LISTENERS ---
    socket.on('auction:select_player', (data) => {
        // Everyone receives this command to open the modal
        openPlayerDetailModal(data, false); // false = do not re-emit
    });

    socket.on('auction:close_player', () => {
        closePlayerModal(false); // false = do not re-emit
    });
    // ----------------------------

    // -- UI Render --
    function setupUI() {
      document.getElementById('roleDisplay').textContent = `Host: ${CURRENT_USER.hostId} | Role: ${CURRENT_USER.role.toUpperCase()}`;
      const adminElems = ['adminConfigCard', 'btnResetSystem', 'btnExportAdmin'];
      adminElems.forEach(id => document.getElementById(id).classList.toggle('hidden', CURRENT_USER.role !== 'admin'));
      if(CURRENT_USER.role === 'team') document.getElementById('myTeamCard').classList.remove('hidden');
    }

    function renderAll() {
      const ctn = document.getElementById('categoriesContainer');
      ctn.innerHTML = '';
      if(STATE.categories.length === 0) ctn.innerHTML = '<div style="color:var(--muted)">No categories.</div>';
      
      STATE.categories.forEach(cat => {
        const div = document.createElement('div');
        let html = `
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <strong style="color:white">Cat ${cat.id}</strong>
            <span class="small">Base:${cat.base} | Inc:${cat.increment}</span>
          </div>`;
        
        if(CURRENT_USER.role === 'admin') {
           html += `<textarea id="ta-${cat.id}" class="cat-ta" onblur="saveCat('${cat.id}')" placeholder="Paste Names..."></textarea>`;
           html += `<div style="margin-bottom:10px;display:flex;gap:5px;">
             <button class="ghost small" onclick="saveCat('${cat.id}')">Save List</button>
             <button class="red small" onclick="deleteCat('${cat.id}')">Del Cat</button>
           </div>`;
        }
        html += `<div class="players" id="playersList-${cat.id}"></div>`;
        div.innerHTML = html;
        ctn.appendChild(div);
        
        // Render Players
        const pContainer = div.querySelector(`#playersList-${cat.id}`);
        const players = STATE.playersSnapshot[cat.id] || [];
        
        players.forEach(p => {
             const key = `${cat.id}:${p.name}`;
             const isSold = STATE.soldPrices[key] ? true : false;
             const price = STATE.soldPrices[key] || STATE.activeBids[key] || p.price || cat.base;
             
             const el = document.createElement('div');
             el.className = `player ${isSold ? 'sold' : ''}`;
             el.dataset.name = p.name;
             
             let status = `৳ ${price}`;
             if(isSold) status += ` <span style="color:var(--accent);font-size:11px;">(Sold)</span>`;
             else if(STATE.activeBids[key]) status += ` <span style="color:#fbbf24;font-size:11px;">(Bid)</span>`;

             // Reset Button for Admin
             let resetBtn = '';
             if(CURRENT_USER.role === 'admin' && (isSold || STATE.activeBids[key])) {
                 resetBtn = `<button class="yellow small" onclick="resetPlayer('${cat.id}','${p.name}')" style="margin-left:5px">↺</button>`;
             }

             el.innerHTML = `
               <div class="left" style="flex:1">
                 <button class="player-btn ${CURRENT_USER.role !== 'admin' ? 'disabled' : ''}" id="btn-${key.replace(/[^a-z0-9]/gi,'')}">${p.name}</button>
               </div>
               <div class="right" style="display:flex;align-items:center">
                 <span class="price" style="font-weight:bold; font-size:14px;">${status}</span>
                 ${resetBtn}
               </div>
             `;
             
             // CLICK LOGIC: ONLY ADMIN CAN OPEN
             const btn = el.querySelector('.player-btn');
             if(CURRENT_USER.role === 'admin') {
                 btn.onclick = () => {
                     // Open Local & Sync
                     const data = { 
                         name: p.name, 
                         category: cat.id, 
                         price: price, 
                         image: p.image,
                         increment: cat.increment,
                         isSold: isSold 
                     };
                     openPlayerDetailModal(data, true); // true = emit to server
                 };
             } else {
                 btn.onclick = (e) => e.preventDefault(); // Teams click does nothing
             }

             pContainer.appendChild(el);
        });
        
        // Fill textareas if admin
        if(CURRENT_USER.role === 'admin') {
           const ta = document.getElementById(`ta-${cat.id}`);
           if(ta && document.activeElement !== ta) ta.value = players.map(x=>x.name).join('\n');
        }
      });
    }

    // --- MODAL FUNCTIONS ---
    function openPlayerDetailModal(data, emitSync) {
        currentlyViewedPlayer = data;
        
        // Emit if Admin triggered it locally
        if(emitSync && CURRENT_USER.role === 'admin') {
            socket.emit('admin:select_player', data);
        }

        // Populate Data
        document.getElementById('detailName').textContent = data.name;
        document.getElementById('detailCat').textContent = data.category;
        document.getElementById('detailPrice').textContent = data.price;
        updateModalImage(data.image);

        const modal = document.getElementById('playerDetailModal');
        const adminControls = document.getElementById('adminImgControls');
        const adminActions = document.getElementById('detailAdminActions');
        const viewerMsg = document.getElementById('detailViewerMsg');
        const closeBtn = document.getElementById('btnCloseDetail');

        // Role-based visibility
        if(CURRENT_USER.role === 'admin') {
            adminControls.classList.remove('hidden');
            adminActions.classList.toggle('hidden', data.isSold);
            viewerMsg.classList.add('hidden');
            document.getElementById('detailImgUrl').value = data.image || '';
            
            // Bind Admin Buttons
            document.getElementById('btnDetailBid').onclick = () => {
                const next = Number(document.getElementById('detailPrice').textContent) + Number(data.increment);
                socket.emit('player:bid', { category: data.category, name: data.name, price: next });
            };
            document.getElementById('btnDetailSold').onclick = () => {
                // Admin closes manual, then opens Sold modal
                closePlayerModal(true); 
                openSoldConfirmation(data.category, data.name, document.getElementById('detailPrice').textContent);
            };
            
            closeBtn.onclick = () => closePlayerModal(true); // Admin close syncs

        } else {
            // Team/Viewer View
            adminControls.classList.add('hidden');
            adminActions.classList.add('hidden');
            viewerMsg.classList.remove('hidden');
            document.getElementById('viewStatus').textContent = data.isSold ? "Player Sold" : "Bidding in Progress...";
            
            // Viewers cannot close the modal themselves (it's driven by admin)
            // But we allow local close just in case, but usually hide the button?
            // Prompt says "pop up ... will appear". Generally synced modals are controlled by admin.
            // We'll leave the close button but it only closes locally.
            closeBtn.onclick = () => closePlayerModal(false); 
        }

        modal.classList.remove('hidden');
    }

    function closePlayerModal(emitSync) {
        document.getElementById('playerDetailModal').classList.add('hidden');
        currentlyViewedPlayer = null;
        if(emitSync && CURRENT_USER.role === 'admin') {
            socket.emit('admin:close_player');
        }
    }

    function updateModalImage(url) {
        const c = document.getElementById('detailImgContainer');
        if(url) c.innerHTML = `<img src="${url}" alt="p">`;
        else c.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
    }

    function savePlayerImage() {
        const url = document.getElementById('detailImgUrl').value;
        if(currentlyViewedPlayer) {
            socket.emit('admin:updatePlayerImage', { 
                category: currentlyViewedPlayer.category, 
                name: currentlyViewedPlayer.name, 
                imageUrl: url 
            });
            updateModalImage(url); // Local update immediately
        }
    }

    // --- OTHER HELPERS ---
    function renderScoreboard() {
        const sb = document.getElementById('scoreboard'); sb.innerHTML = '';
        STATE.teams.forEach(t => {
            const c = t.purchases ? Object.keys(t.purchases).length : 0;
            sb.innerHTML += `<div class="team-row"><div><strong>${t.name}</strong></div><div style="text-align:right"><div>৳ ${t.purse}</div><div class="small" style="color:#94a3b8">${c} Plyrs</div></div></div>`;
        });
    }
    function renderMyTeam() {
        if(CURRENT_USER.role !== 'team') return;
        const t = STATE.teams.find(x => x.id === CURRENT_USER.teamId);
        if(!t) return;
        let html = `<div style="font-size:24px;font-weight:bold;margin-bottom:10px">Purse: ৳ ${t.purse}</div><strong>My Squad:</strong>`;
        if(t.purchases) Object.entries(t.purchases).forEach(([c,n]) => html += `<div style="padding:5px;border-bottom:1px solid rgba(255,255,255,0.05)">[${c}] ${n}</div>`);
        document.getElementById('myTeamContent').innerHTML = html;
    }
    function renderTeamConfig() {
        const c = document.getElementById('teamsConfigContainer'); c.innerHTML = '';
        STATE.teams.forEach(t => {
            c.innerHTML += `<div class="team-config-row">
             <input class="t-id" value="${t.id}"> <input class="t-name" value="${t.name}"> <input class="t-pass" value="${t.password}"> <input type="number" class="t-purse" value="${t.purse}">
             <button class="yellow small" onclick="alert('Edit purse manually')">↺</button> <button class="red small" onclick="this.parentElement.remove()">X</button></div>`;
        });
    }

    // --- ADMIN ACTIONS ---
    document.getElementById('btnAddCat').onclick = () => {
        const id=document.getElementById('newCatId').value, b=document.getElementById('newCatBase').value, i=document.getElementById('newCatInc').value;
        if(id&&b&&i) { STATE.categories.push({id:id.toUpperCase(), base:Number(b), increment:Number(i)}); socket.emit('admin:updateConfig', {categories:STATE.categories}); }
    };
    document.getElementById('btnAddTeamRow').onclick = () => {
        STATE.teams.push({id:'', name:'', password:'', purse:500}); renderTeamConfig();
    };
    document.getElementById('btnSaveTeams').onclick = () => {
        const rows = document.querySelectorAll('.team-config-row');
        const newT = [];
        rows.forEach(r => {
             const i=r.querySelector('.t-id')?.value, n=r.querySelector('.t-name')?.value, p=r.querySelector('.t-pass')?.value, pu=r.querySelector('.t-purse')?.value;
             if(i && n) newT.push({id:i, name:n, password:p, purse:Number(pu)});
        });
        socket.emit('admin:updateConfig', {teams:newT});
    };
    
    function openSoldConfirmation(cat, name, price) {
        pendingSold = { category: cat, name, price: Number(price) };
        const sel = document.getElementById('soldActionTeam'); sel.innerHTML = '';
        document.getElementById('soldActionDetails').textContent = `${name} @ ${price}`;
        STATE.teams.forEach(t => {
             const dis = (t.purse < Number(price) || (t.purchases && t.purchases[cat])) ? 'disabled' : '';
             sel.innerHTML += `<option value="${t.id}" ${dis}>${t.name} (৳${t.purse})</option>`;
        });
        document.getElementById('soldActionOverlay').classList.remove('hidden');
    }
    document.getElementById('btnConfirmSold').onclick = () => {
        const tid = document.getElementById('soldActionTeam').value;
        if(tid) { socket.emit('player:sold', {...pendingSold, teamId:tid}); document.getElementById('soldActionOverlay').classList.add('hidden'); }
    };
    document.getElementById('btnCancelSold').onclick = () => document.getElementById('soldActionOverlay').classList.add('hidden');

    window.saveCat = (id) => {
        const ta = document.getElementById(`ta-${id}`);
        if(ta) { 
            const names = ta.value.split('\n').filter(x=>x.trim());
            const c = STATE.categories.find(x=>x.id===id);
            socket.emit('players:save', {category:id, players:names.map(n=>({name:n, price:c.base}))});
        }
    };
    window.deleteCat = (id) => { if(confirm('Del?')) socket.emit('admin:deleteCategory', {id}); };
    window.resetPlayer = (c,n) => { if(confirm('Reset?')) socket.emit('admin:resetPlayer', {category:c, name:n}); };
    
    function log(m) { const d=document.createElement('div'); d.textContent=m; document.getElementById('log').prepend(d); }
    function getPlayerEl(c,n) { const l=document.getElementById(`playersList-${c}`); return l ? Array.from(l.children).find(e=>e.dataset.name===n) : null; }
  </script>
</body>
</html>
