<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Auction Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <div id="loginOverlay" class="d-flex justify-content-center align-items-center">
        <div class="card p-4 text-dark" style="width: 300px;">
            <h3>Login</h3>
            <select id="userRole" class="form-select mb-3">
                <option value="viewer">Viewer</option>
                <option value="admin">Admin</option>
                <option value="team">Team Manager</option>
            </select>
            <input type="text" id="teamNameInput" class="form-control mb-3" placeholder="Team Name (if Team)" style="display:none;">
            <button class="btn btn-primary" onclick="appLogin()">Enter Auction</button>
        </div>
    </div>

    <div class="container-fluid p-3" id="mainDashboard" style="display:none;">
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-secondary text-white">
                    <div class="card-header">Unsold Players</div>
                    <div class="card-body scrollable-box" id="playerList">
                        </div>
                </div>
                
                <div id="adminPanel" class="mt-3 p-2 border border-warning" style="display:none;">
                    <h5>Admin: Add Player</h5>
                    <input type="text" id="newPlayerName" placeholder="Name" class="form-control mb-1">
                    <input type="number" id="newBasePrice" placeholder="Base Price" class="form-control mb-1">
                    <input type="text" id="newPlayerImg" placeholder="Image URL" class="form-control mb-1">
                    <button class="btn btn-warning w-100" onclick="addPlayerToDB()">Add Player</button>
                </div>
            </div>

            <div class="col-md-6 text-center">
                <h1 class="display-5">G4 PREMIER LEAGUE</h1>
                <div id="liveBoard" class="mt-5">
                    <h3>Waiting for next player...</h3>
                </div>
                
                <div id="hammerContainer" style="display:none;">
                    <img src="hammer.png" id="hammerImg" class="hammer-idle" width="200">
                    <h2 class="text-warning" id="soldText">SOLD!</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-secondary text-white">
                    <div class="card-header">Team Standings</div>
                    <div class="card-body scrollable-box" id="teamList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="biddingPopup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <div class="row">
                <div class="col-md-4">
                    <img id="popupPlayerImg" src="" class="img-fluid rounded">
                </div>
                <div class="col-md-8">
                    <h2 id="popupPlayerName">Player Name</h2>
                    <h4>Current Bid: <span id="popupBidValue" class="text-warning">0</span></h4>
                    
                    <div id="adminControls" style="display:none;" class="mt-3">
                        <button class="btn btn-danger btn-lg" onclick="adjustBid(-500)">- 500</button>
                        <button class="btn btn-success btn-lg" onclick="adjustBid(500)">+ 500</button>
                        <button class="btn btn-success btn-lg" onclick="adjustBid(1000)">+ 1000</button>
                        <hr>
                        <button class="btn btn-primary w-100" onclick="openSoldModal()">MARK SOLD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sellModal" class="popup-overlay" style="display:none; z-index: 2000;">
        <div class="popup-content bg-light text-dark">
            <h3>Sold to which team?</h3>
            <select id="winnerTeamSelect" class="form-select mb-3"></select>
            
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="impactUsedCheck">
                <label class="form-check-label" for="impactUsedCheck">
                    Used Impact Purse? (Cannot be undone)
                </label>
            </div>
            
            <button class="btn btn-success" onclick="confirmSale()">CONFIRM SALE</button>
            <button class="btn btn-secondary" onclick="document.getElementById('sellModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</body>
</html>
